version: '3.8'

services:
  # Almacenamiento de datos
  minio:
    image: minio/minio
    container_name: lakehouse_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # IA Local (Ollama)
  ollama:
    image: ollama/ollama
    container_name: lakehouse_ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Interfaz Streamlit + Procesamiento (Aquí unificamos todo)
  lakehouse_ui:
    build: .
    container_name: lakehouse_ui
    env_file:
      - .env  # <--- Esto carga tu GROQ_API_KEY automáticamente
    ports:
      - "8502:8501"  # <--- Entrarás por http://localhost:8502
    environment:
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - .:/app
    depends_on:
      - minio
      - ollama
    command: sh entrypoint.sh

volumes:
  minio_data:
  ollama_data: